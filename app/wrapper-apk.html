<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#3B82F6">
    <title>LocalRequest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            color: white;
        }
        
        .logo {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .logo span {
            font-size: 48px;
            font-weight: bold;
            color: #3B82F6;
        }
        
        h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        p {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 40px;
        }
        
        .btn {
            display: inline-block;
            background: white;
            color: #3B82F6;
            padding: 18px 50px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .features {
            margin-top: 50px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            max-width: 500px;
        }
        
        .feature {
            text-align: center;
        }
        
        .feature-icon {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 24px;
        }
        
        .feature-text {
            font-size: 14px;
            opacity: 0.9;
        }
        
        @media (max-width: 480px) {
            .features {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <span>LR</span>
        </div>
        
        <h1>LocalRequest</h1>
        <p>L'app che inverte gli annunci</p>
        
        <a href="https://ff4pgsqs3wk3i.ok.kimi.link" class="btn">
            Apri App
        </a>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">📍</div>
                <div class="feature-text">Annunci locali</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🔔</div>
                <div class="feature-text">Notifiche istantanee</div>
            </div>
            <div class="feature">
                <div class="feature-icon">💬</div>
                <div class="feature-text">Contatto diretto</div>
            </div>
        </div>
    </div>
    
    <script>
        // Reindirizza automaticamente all'app
        window.location.href = 'https://ff4pgsqs3wk3i.ok.kimi.link';
    </script>
</body>
</html>
